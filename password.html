<!DOCTYPE html>
<html lang="es">
<head>

    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

        <h1>Generador de Contraseñas Seguras</h1>

        <p id="password-resultado"></p>
    </div>
